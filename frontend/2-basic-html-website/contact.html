            </ul>

    </header>

    <main>
        <section class="contact">
            <h1>Contact</h1>
            <form method="post">
                <div>
                    <label for="name">Your name:</label>
                    <input
                    type="text"
                    id="name"
                    name="name"
                    required
                    minlength="1"
                    placeholder="your name" />
                </div>

                <div>
                    <label for="email">Email:</label>
                    <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="your email"
                    required
                    minlength="1" />
                </div>

                <div>
                    <label for="message">Message:</label>
                    <textarea name="message" id="message" rows="6" cols="50" placeholder="some message"></textarea>
                </div>

                <div>
                    <input type="submit" />
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© all rights reserved</p>
    </footer>
</body>
