<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
</head>
<body>
    <header>
        <h1>Acme Support</h1>
        <nav>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Help</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <hr>

        <h2>Contact us</h2>
        <p>Send us a message and we will get back to you.</p>

        <form action="https://example.com" method="POST">
            <div>
                <label for="name">Full name</label>
                <input id="name" name="name" type="text">
            </div>

            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required minlength="1">
            </div>

            <div>
                <label for="subject">Subject</label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected hidden>Choose a topic</option>
                    <option value="site">Site</option>
                    <option value="security">Security</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" cols="50" required minlength="1"></textarea>
            </div>

            <fieldset>
                <legend>How did you hear about us?</legend>

                <div>
                    <input type="radio" id="search" name="how_hear" value="search" checked />
                    <label for="search">Search</label>
                </div>

                <div>
                    <input type="radio" id="friend" name="how_hear" value="friend" />
                    <label for="friend">Friend</label>
                </div>

                <div>
                    <input type="radio" id="social" name="how_hear" value="social" />
                    <label for="social">Social media</label>
                </div>
            </fieldset>

            <input type="checkbox" id="news" name="news">
            <label for="new">Send me product updates</label>

            <div>
                <button type="submit">Send message</button>
            </div>
        </form>
    </main>

    <footer>
        <hr>
        <p>© 2026 Acme Support</p>
    </footer>
</body>
</html>
